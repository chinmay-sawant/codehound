# Multi-arch binary release on version tags (v0.1.0, v1.2.3, …).
# Workflow graph: validate ──► build ──┐
#                         └──► sbom  ──┴──► publish
# Publish cannot run when validate fails (needs: validate, build, sbom).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: release validation
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v7.0.1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      # pin: dtolnay/rust-toolchain@master (2026-07-23); toolchain is exact
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.88"
          components: clippy,rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint all supported features
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test all supported features
        run: cargo test --all-targets --all-features --locked
      - name: Test public documentation
        run: cargo test --doc --all-features --locked
      - name: Build public documentation without warnings
        run: RUSTDOCFLAGS='-D warnings' cargo doc --all-features --no-deps --locked
      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit dependencies
        run: cargo audit
      - name: Build release canary binary
        run: cargo build --release --bin codehound --locked
      - name: Run release canaries
        env:
          CODEHOUND_BIN: ${{ github.workspace }}/target/release/codehound
        run: bash scripts/canary/run_canaries.sh

  build:
    name: build (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      # pin: actions/checkout@v7.0.1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      # pin: dtolnay/rust-toolchain@master (2026-07-23); toolchain is exact
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin codehound --target ${{ matrix.target }} --locked
          else
            cargo build --release --bin codehound --target ${{ matrix.target }} --locked
          fi
          BIN="target/${{ matrix.target }}/release/codehound"
          if [ -f "${BIN}.exe" ]; then BIN="${BIN}.exe"; fi
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          ls -la "$BIN"

      - name: Package + checksum
        shell: bash
        run: |
          set -euo pipefail
          STAGE="codehound-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$STAGE"
          cp "$BIN" "dist/$STAGE/"
          cp README.md LICENSE LICENSE-MIT LICENSE-APACHE "dist/$STAGE/" 2>/dev/null || true
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${STAGE}.zip" "$STAGE"
            ARTIFACT="${STAGE}.zip"
          else
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            ARTIFACT="${STAGE}.tar.gz"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"
          else
            shasum -a 256 "$ARTIFACT" > "${ARTIFACT}.sha256"
          fi
          echo "ARTIFACT=dist/$ARTIFACT" >> "$GITHUB_ENV"
          echo "SUM=dist/${ARTIFACT}.sha256" >> "$GITHUB_ENV"

      # pin: actions/upload-artifact@v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: codehound-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.SUM }}

  sbom:
    name: sbom
    needs: validate
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v7.0.1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      # pin: dtolnay/rust-toolchain@master (2026-07-23); toolchain is exact
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.88"
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Generate SBOM
        run: cargo cyclonedx -f json --all --output-cdx codehound.cdx.json || cargo cyclonedx --format json > codehound.cdx.json
      # pin: actions/upload-artifact@v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: codehound.cdx.json

  publish:
    name: github release
    # Explicit validate dependency: publish cannot run when validation fails.
    needs: [validate, build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # pin: actions/checkout@v7.0.1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      # pin: actions/download-artifact@v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' -o -name '*.cdx.json' \) -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub Release
        # pin: softprops/action-gh-release@v3.0.2
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## CodeHound ${{ github.ref_name }}

            Multi-arch binaries + SHA-256 checksums + CycloneDX SBOM.

            **Install:** download the archive for your target, extract `codehound`, place on `PATH`.

            **License:** MIT OR Apache-2.0

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) and [ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
