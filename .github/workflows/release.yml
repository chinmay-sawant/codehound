# Multi-arch binary release on version tags (v0.1.0, v1.2.3, …).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin codehound --target ${{ matrix.target }}
          else
            cargo build --release --bin codehound --target ${{ matrix.target }}
          fi
          BIN="target/${{ matrix.target }}/release/codehound"
          if [ -f "${BIN}.exe" ]; then BIN="${BIN}.exe"; fi
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          ls -la "$BIN"

      - name: Package + checksum
        shell: bash
        run: |
          set -euo pipefail
          STAGE="codehound-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$STAGE"
          cp "$BIN" "dist/$STAGE/"
          cp README.md LICENSE LICENSE-MIT LICENSE-APACHE "dist/$STAGE/" 2>/dev/null || true
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${STAGE}.zip" "$STAGE"
            ARTIFACT="${STAGE}.zip"
          else
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            ARTIFACT="${STAGE}.tar.gz"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"
          else
            shasum -a 256 "$ARTIFACT" > "${ARTIFACT}.sha256"
          fi
          echo "ARTIFACT=dist/$ARTIFACT" >> "$GITHUB_ENV"
          echo "SUM=dist/${ARTIFACT}.sha256" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: codehound-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.SUM }}

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx -f json --all --output-cdx codehound.cdx.json || cargo cyclonedx --format json > codehound.cdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: codehound.cdx.json

  publish:
    name: github release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' -o -name '*.cdx.json' \) -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## CodeHound ${{ github.ref_name }}

            Multi-arch binaries + SHA-256 checksums + CycloneDX SBOM.

            **Install:** download the archive for your target, extract `codehound`, place on `PATH`.

            **License:** MIT OR Apache-2.0

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) and [ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
