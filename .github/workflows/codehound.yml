# Sample CodeHound CI recipe (high-signal recommended pack).
# Copy into your app repo, or use the composite action from this monorepo.
name: codehound

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      # pin: actions/checkout@v7.0.1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: CodeHound scan (recommended + SARIF)
        uses: ./.github/actions/codehound-scan
        with:
          profile: recommended
          paths: .
          strict: "true"
          upload-sarif: "true"
