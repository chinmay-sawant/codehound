name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (${{ matrix.os }} / ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        features:
          - default
          - go
          - python
    steps:
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          components: clippy, rustfmt
          features: ${{ matrix.features }}
      - name: Build
        run: |
          if [ "${{ matrix.features }}" = "default" ]; then
            cargo build --all-targets
          else
            cargo build --all-targets --no-default-features --features ${{ matrix.features }}
          fi
      - name: Test
        run: |
          if [ "${{ matrix.features }}" = "default" ]; then
            cargo test --all-targets
          else
            cargo test --all-targets --no-default-features --features ${{ matrix.features }}
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    steps:
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          components: clippy, rustfmt
          features: lint
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: No production unwrap/expect
        run: bash scripts/check_no_prod_expect.sh
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - name: Test on MSRV
        run: cargo test --all-targets

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  bench:
    name: bench
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    steps:
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          features: bench
      - name: Run criterion bench
        run: cargo bench --bench scan_throughput -- --output-format bencher 2>&1 | tee bench_output.txt
      - name: Check perf budget
        run: bash scripts/check_bench_budget.sh
