name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (${{ matrix.os }} / ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        features:
          - default
          - go
          # Opt-in Python (ADR 0005): build with go+python so Go tests still run.
          - go,python
    steps:
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          components: clippy, rustfmt
          features: ${{ matrix.features }}
      - name: Build
        run: |
          if [ "${{ matrix.features }}" = "default" ]; then
            cargo build --all-targets --locked
          else
            cargo build --all-targets --locked --no-default-features --features ${{ matrix.features }}
          fi
      - name: Test
        run: |
          if [ "${{ matrix.features }}" = "default" ]; then
            cargo test --all-targets --locked
          else
            cargo test --all-targets --locked --no-default-features --features ${{ matrix.features }}
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    steps:
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          components: clippy, rustfmt
          features: lint
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: No production unwrap/expect
        run: bash scripts/check_no_prod_expect.sh
      - name: No unbounded Box::leak on finding path (allowlist)
        run: bash scripts/check_no_box_leak.sh
      - name: Module size policy (src ≤ 400 lines)
        run: bash scripts/check_module_size.sh
      - name: clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
      - name: Test on MSRV
        run: cargo test --all-targets --locked

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  canary:
    name: canary budgets
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    steps:
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          features: default
      - name: Build release binary
        run: cargo build --release --bin codehound
      - name: Run canary finding-count budgets
        env:
          CODEHOUND_BIN: ${{ github.workspace }}/target/release/codehound
        run: bash scripts/canary/run_canaries.sh

  bench:
    name: bench
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: -D warnings
    steps:
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          features: bench
      - name: Run criterion bench
        run: set -o pipefail; cargo bench --locked --bench scan_throughput -- --output-format bencher 2>&1 | tee bench_output.txt
      - name: Check perf budget
        run: bash scripts/check_bench_budget.sh
      - name: Run incremental bench
        run: set -o pipefail; cargo bench --locked --bench incremental_scan -- --output-format bencher 2>&1 | tee bench_incremental_output.txt
      - name: Check incremental bench budget
        run: bash scripts/check_incremental_bench_budget.sh
      - name: Run taint and span benchmarks
        run: |
          set -o pipefail
          CARGO_INCREMENTAL=0 cargo bench --locked --no-default-features --features go,bench \
            --bench taint_graph --bench span_sweep -- \
            --sample-size 10 --measurement-time 2 --warm-up-time 1 \
            --output-format bencher 2>&1 | tee bench_taint_span_output.txt
          grep -q "taint_interprocedural_summary_ip006" bench_taint_span_output.txt
          grep -q "span_sweep_100" bench_taint_span_output.txt
          grep -q "span_sweep_nested_100" bench_taint_span_output.txt
      - name: Run partial incremental bench
        run: set -o pipefail; cargo bench --locked --no-default-features --features go --bench incremental_partial_scan -- --output-format bencher 2>&1 | tee bench_incremental_partial_output.txt
      - name: Runtime example smoke
        run: cargo test --locked --examples -- --test-threads=1
