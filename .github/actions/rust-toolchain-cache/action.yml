name: 'Rust toolchain + cache'
description: 'Checkout, install Rust toolchain, restore/save cargo cache'
inputs:
  toolchain:
    description: 'Rust toolchain version'
    required: false
    default: 'stable'
  components:
    description: 'Additional toolchain components'
    required: false
    default: ''
  features:
    description: 'Feature flags string for cache key'
    required: false
    default: 'go,python'
runs:
  using: 'composite'
  steps:
    # pin: actions/checkout@v7.0.1
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
    # pin: dtolnay/rust-toolchain@master (2026-07-23); toolchain input selects stable by default
    - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
    # pin: actions/cache@v4
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ inputs.features }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.features }}-
          ${{ runner.os }}-cargo-
