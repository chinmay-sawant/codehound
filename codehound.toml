# Example CodeHound configuration (optional).
# CLI flags override these when both are set for skip/only.

[codehound]
# fail_on = "medium"   # medium | high | none | strict
# skip = ["CWE-89"]
# only = ["CWE-22"]

# Baseline suppression is enabled by default.
# [codehound.baseline]
# enabled = true
# path = ".codehound-baseline.json"

# Bad-practice rules (BP-*) are enabled by default.
# [codehound.bad_practices]
# enabled = true
# severity = "low" # info | low | medium | high | critical
