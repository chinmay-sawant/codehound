<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('codehound-theme') || localStorage.getItem('slopguard-theme')
          if (t === 'light') document.documentElement.classList.remove('dark')
          else document.documentElement.classList.add('dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeHound — Go PERF scanner + framework footgun detector</title>
    <meta name="description" content="CodeHound: Go static analysis for performance hot-path regressions and framework footguns (Gin/Echo/GORM). gopdfsuit went ~2,000→~2,700 ops/sec after fixes. Scan free; triage with Grok 4.5 for $3.85 or DeepSeek for $0.25." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
